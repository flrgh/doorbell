name: Lint & Test

env:
  ROCKSPEC_FILE: "doorbell-dev-1.rockspec"
  LUAROCKS_VERSION: "3.12.0"

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - '*'
    paths:
      - '*.rockspec'
      - '.busted'
      - '.github/**'
      - '.luacheckrc'
      - 'bin/*'
      - 'lib/**/*'
      - 'spec/**/*'
      - '**/*.lua'
      - 'assets/**'

defaults:
  run:
    shell: bash

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "luajit-openresty"

      - name: Install LuaRocks
        uses: leafo/gh-actions-luarocks@v4
        with:
          luarocksVersion: ${{ env.LUAROCKS_VERSION }}

      - name: Install luacheck
        run: luarocks install luacheck

      - name: Lint rockspec file
        run: luarocks lint ${{ env.ROCKSPEC_FILE }}

      - name: Lint Lua files
        run: luacheck lib spec

  test:
    runs-on: ubuntu-latest
    name: Test - OpenResty

    container:
      image: openresty/openresty:1.27.1.2-alpine-fat
      options: >-
        --init

    steps:
      # gcompat lets the glibc node that GitHub injects run on musl, so the
      # JavaScript actions (checkout) work; the rest mirrors the Dockerfile.
      - name: Install OS deps
        run: |
          apk add --no-cache \
            ada-libs \
            bash \
            curl \
            gcompat \
            git \
            libmaxminddb \
            tar
          ln -fs /usr/lib/libada.so.2       /usr/lib/libada.so
          ln -fs /usr/lib/libmaxminddb.so.0 /usr/lib/libmaxminddb.so
        # alpine has no bash until we add it w/ apk
        shell: sh

      - uses: actions/checkout@v4

      - name: Cache LuaRocks Dependencies
        uses: actions/cache@v4
        with:
          path: .luarocks/
          key: v1::alpine-luarocks-openresty-${{ hashFiles('*.rockspec') }}

      - name: Install Main Luarocks Dependencies
        run: luarocks install --deps-only ${{ env.ROCKSPEC_FILE }}

      - name: Install Test Luarocks Dependencies
        run: luarocks test --prepare ${{ env.ROCKSPEC_FILE }}

      - name: Set PATH
        run: echo "${PWD}/bin" >> "$GITHUB_PATH"

      - name: OpenResty info
        run: nginx -V

      - name: Check libmaxminddb
        run: luajit -e 'require("ffi").load("libmaxminddb")'

      - name: Check libada
        run: luajit -e 'require("resty.ada").parse("http://example.com/")'

      - name: Download GeoIP Test Data
        run: ./scripts/download-geoip-test-databases.sh

      - name: Unit Tests
        run: busted --run unit

      - name: Integration Tests
        run: busted --run integration

